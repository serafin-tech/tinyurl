---
services:
  mongodb:
    image: mongo:7
    container_name: tinyurl-mongodb
    volumes:
      - tinyurl-mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - mongosh
        - --eval
        - "db.adminCommand('ping')"
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: tinyurl-backend
    # WARNING: Set a strong TOKEN_PEPPER value in your environment for production!
    # Do NOT commit secrets to version control. See docs/REQUIREMENTS.md for details.
    environment:
      BASE_URL: http://localhost:8000
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: tinyurl
      TOKEN_PEPPER: ${TOKEN_PEPPER:-devpepper}
      ALLOW_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"
      interval: 10s
      timeout: 5s
      retries: 3

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: tinyurl-gateway
    environment:
      BASIC_AUTH_USER: ${BASIC_AUTH_USER}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - 8000:80
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --tries=1
        - --spider
        - http://127.0.0.1/healthz
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  tinyurl-mongo-data:
